<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>원소기호 학습 카드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      color: #e2e8f0;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 36px;
      text-align: center;
    }

    .progress-bar-wrap {
      width: 100%;
      max-width: 480px;
      background: #1e293b;
      border-radius: 999px;
      height: 6px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .progress-label {
      color: #94a3b8;
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 28px;
    }

    .card-scene {
      width: 320px;
      height: 220px;
      perspective: 900px;
      cursor: pointer;
      margin-bottom: 36px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .card-front {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1.5px solid #334155;
    }

    .card-front .atomic-number {
      font-size: 0.9rem;
      color: #64748b;
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .card-front .symbol {
      font-size: 5rem;
      font-weight: 800;
      color: #e2e8f0;
      line-height: 1;
      letter-spacing: -2px;
    }

    .card-front .hint {
      font-size: 0.75rem;
      color: #475569;
      margin-top: 4px;
    }

    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, #312e81 0%, #1e1b4b 100%);
      border: 1.5px solid #4338ca;
    }

    .card-back .atomic-number {
      font-size: 0.85rem;
      color: #a5b4fc;
      font-weight: 600;
    }

    .card-back .symbol {
      font-size: 2.8rem;
      font-weight: 800;
      color: #c7d2fe;
      letter-spacing: -1px;
    }

    .card-back .name-ko {
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .card-back .name-en {
      font-size: 0.85rem;
      color: #a5b4fc;
      font-weight: 500;
    }

    .card-back .mass {
      font-size: 0.75rem;
      color: #6366f1;
      background: rgba(99,102,241,0.15);
      border-radius: 999px;
      padding: 2px 10px;
      margin-top: 4px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
      padding: 12px 28px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-flip {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }
    .btn-flip:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(99,102,241,0.45);
    }

    .btn-nav {
      background: #1e293b;
      color: #94a3b8;
      border: 1.5px solid #334155;
      padding: 12px 18px;
      font-size: 1.1rem;
    }
    .btn-nav:hover { background: #334155; color: #e2e8f0; }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .mode-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }
    .btn-mode {
      background: #1e293b;
      color: #64748b;
      border: 1.5px solid #334155;
      padding: 8px 18px;
      font-size: 0.8rem;
      border-radius: 8px;
    }
    .btn-mode.active {
      background: #6366f1;
      color: #fff;
      border-color: #6366f1;
    }

    .dots {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 380px;
      margin-top: 28px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1e293b;
      border: 1.5px solid #334155;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dot.seen { background: #4338ca; border-color: #6366f1; }
    .dot.current { background: #a78bfa; border-color: #a78bfa; transform: scale(1.3); }

    .tip {
      color: #475569;
      font-size: 0.75rem;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>⚗️ 원소기호 학습 카드</h1>
<p class="subtitle">1번 ~ 20번 원소 &middot; 카드를 클릭하면 이름이 나타납니다</p>

<div class="mode-wrap">
  <button class="btn-mode active" id="modeSeq" onclick="setMode('seq')">순서대로</button>
  <button class="btn-mode" id="modeShuffle" onclick="setMode('shuffle')">랜덤</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressFill"></div>
</div>
<p class="progress-label" id="progressLabel">1 / 20</p>

<div class="card-scene" id="cardScene" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face card-front">
      <div class="atomic-number" id="frontNum"></div>
      <div class="symbol" id="frontSymbol"></div>
      <div class="hint">탭하면 이름 확인</div>
    </div>
    <div class="card-face card-back">
      <div class="atomic-number" id="backNum"></div>
      <div class="symbol" id="backSymbol"></div>
      <div class="name-ko" id="backNameKo"></div>
      <div class="name-en" id="backNameEn"></div>
      <div class="mass" id="backMass"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn-nav" id="btnPrev" onclick="navigate(-1)">&#9664;</button>
  <button class="btn-flip" onclick="flipCard()">뒤집기</button>
  <button class="btn-nav" id="btnNext" onclick="navigate(1)">&#9654;</button>
</div>

<div class="dots" id="dots"></div>
<p class="tip">키보드 ← → 로 이동 &nbsp;|&nbsp; 스페이스바로 뒤집기</p>

<script>
  const elements = [
    { num: 1,  sym: 'H',  ko: '수소',    en: 'Hydrogen',    mass: '1.008' },
    { num: 2,  sym: 'He', ko: '헬륨',    en: 'Helium',      mass: '4.003' },
    { num: 3,  sym: 'Li', ko: '리튬',    en: 'Lithium',     mass: '6.941' },
    { num: 4,  sym: 'Be', ko: '베릴륨',  en: 'Beryllium',   mass: '9.012' },
    { num: 5,  sym: 'B',  ko: '붕소',    en: 'Boron',       mass: '10.81' },
    { num: 6,  sym: 'C',  ko: '탄소',    en: 'Carbon',      mass: '12.01' },
    { num: 7,  sym: 'N',  ko: '질소',    en: 'Nitrogen',    mass: '14.01' },
    { num: 8,  sym: 'O',  ko: '산소',    en: 'Oxygen',      mass: '16.00' },
    { num: 9,  sym: 'F',  ko: '플루오린', en: 'Fluorine',   mass: '19.00' },
    { num: 10, sym: 'Ne', ko: '네온',    en: 'Neon',        mass: '20.18' },
    { num: 11, sym: 'Na', ko: '나트륨',  en: 'Sodium',      mass: '22.99' },
    { num: 12, sym: 'Mg', ko: '마그네슘', en: 'Magnesium',  mass: '24.31' },
    { num: 13, sym: 'Al', ko: '알루미늄', en: 'Aluminium',  mass: '26.98' },
    { num: 14, sym: 'Si', ko: '규소',    en: 'Silicon',     mass: '28.09' },
    { num: 15, sym: 'P',  ko: '인',      en: 'Phosphorus',  mass: '30.97' },
    { num: 16, sym: 'S',  ko: '황',      en: 'Sulfur',      mass: '32.07' },
    { num: 17, sym: 'Cl', ko: '염소',    en: 'Chlorine',    mass: '35.45' },
    { num: 18, sym: 'Ar', ko: '아르곤',  en: 'Argon',       mass: '39.95' },
    { num: 19, sym: 'K',  ko: '칼륨',    en: 'Potassium',   mass: '39.10' },
    { num: 20, sym: 'Ca', ko: '칼슘',    en: 'Calcium',     mass: '40.08' },
  ];

  let order = elements.map((_, i) => i);
  let currentIdx = 0;
  let flipped = false;
  let seen = new Set([0]);
  let mode = 'seq';

  function setMode(m) {
    mode = m;
    document.getElementById('modeSeq').classList.toggle('active', m === 'seq');
    document.getElementById('modeShuffle').classList.toggle('active', m === 'shuffle');
    if (m === 'shuffle') {
      order = [...Array(20).keys()].sort(() => Math.random() - 0.5);
    } else {
      order = elements.map((_, i) => i);
    }
    currentIdx = 0;
    seen = new Set([0]);
    flipped = false;
    render();
  }

  function render() {
    const el = elements[order[currentIdx]];
    document.getElementById('frontNum').textContent = '원자번호 ' + el.num;
    document.getElementById('frontSymbol').textContent = el.sym;
    document.getElementById('backNum').textContent = '원자번호 ' + el.num;
    document.getElementById('backSymbol').textContent = el.sym;
    document.getElementById('backNameKo').textContent = el.ko;
    document.getElementById('backNameEn').textContent = el.en;
    document.getElementById('backMass').textContent = '원자량 ' + el.mass;

    document.getElementById('cardInner').classList.toggle('flipped', flipped);

    const pct = ((currentIdx + 1) / elements.length * 100).toFixed(0);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = (currentIdx + 1) + ' / ' + elements.length;

    document.getElementById('btnPrev').disabled = currentIdx === 0;
    document.getElementById('btnNext').disabled = currentIdx === elements.length - 1;

    renderDots();
  }

  function renderDots() {
    const container = document.getElementById('dots');
    container.innerHTML = '';
    for (let i = 0; i < elements.length; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (seen.has(i) ? ' seen' : '') + (i === currentIdx ? ' current' : '');
      (function(idx) { d.onclick = function(e) { e.stopPropagation(); goTo(idx); }; })(i);
      container.appendChild(d);
    }
  }

  function flipCard() {
    flipped = !flipped;
    document.getElementById('cardInner').classList.toggle('flipped', flipped);
  }

  function navigate(dir) {
    const next = currentIdx + dir;
    if (next < 0 || next >= elements.length) return;
    currentIdx = next;
    flipped = false;
    seen.add(currentIdx);
    render();
  }

  function goTo(i) {
    currentIdx = i;
    flipped = false;
    seen.add(i);
    render();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') navigate(1);
    else if (e.key === 'ArrowLeft') navigate(-1);
    else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  });

  render();
</script>
</body>
</html>
