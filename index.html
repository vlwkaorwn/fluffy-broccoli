<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화학식 학습 카드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      color: #e2e8f0;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Category filter */
    .category-wrap {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 520px;
      margin-bottom: 20px;
    }
    .btn-cat {
      background: #1e293b;
      color: #64748b;
      border: 1.5px solid #334155;
      padding: 6px 14px;
      font-size: 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }
    .btn-cat:hover { background: #334155; color: #e2e8f0; }
    .btn-cat.active {
      background: #0e7490;
      color: #fff;
      border-color: #0e7490;
    }

    /* Mode toggle */
    .mode-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .btn-mode {
      background: #1e293b;
      color: #64748b;
      border: 1.5px solid #334155;
      padding: 8px 18px;
      font-size: 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-mode.active {
      background: #6366f1;
      color: #fff;
      border-color: #6366f1;
    }

    /* Progress */
    .progress-bar-wrap {
      width: 100%;
      max-width: 480px;
      background: #1e293b;
      border-radius: 999px;
      height: 6px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .progress-label {
      color: #94a3b8;
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 24px;
    }

    /* Card */
    .card-scene {
      width: 340px;
      height: 230px;
      perspective: 900px;
      cursor: pointer;
      margin-bottom: 32px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      padding: 20px;
    }

    /* Front */
    .card-front {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1.5px solid #334155;
    }
    .card-front .cat-badge {
      font-size: 0.7rem;
      color: #94a3b8;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 2px 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .card-front .formula {
      font-size: 3.6rem;
      font-weight: 800;
      color: #e2e8f0;
      line-height: 1.1;
      letter-spacing: -1px;
      text-align: center;
    }
    .card-front .hint {
      font-size: 0.75rem;
      color: #475569;
      margin-top: 6px;
    }

    /* Back */
    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, #134e4a 0%, #0f172a 100%);
      border: 1.5px solid #0d9488;
    }
    .card-back .cat-badge {
      font-size: 0.7rem;
      color: #5eead4;
      background: rgba(13,148,136,0.15);
      border: 1px solid #0d9488;
      border-radius: 999px;
      padding: 2px 10px;
      font-weight: 600;
    }
    .card-back .formula-sm {
      font-size: 1.8rem;
      font-weight: 800;
      color: #99f6e4;
      letter-spacing: -0.5px;
    }
    .card-back .name-ko {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.02em;
      text-align: center;
    }
    .card-back .name-en {
      font-size: 0.82rem;
      color: #5eead4;
      font-weight: 500;
    }
    .card-back .desc {
      font-size: 0.73rem;
      color: #64748b;
      text-align: center;
      line-height: 1.5;
      margin-top: 2px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
      padding: 12px 28px;
    }

    .btn-flip {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }
    .btn-flip:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(99,102,241,0.45);
    }

    .btn-nav {
      background: #1e293b;
      color: #94a3b8;
      border: 1.5px solid #334155;
      padding: 12px 18px;
      font-size: 1.1rem;
    }
    .btn-nav:hover { background: #334155; color: #e2e8f0; }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* Dots */
    .dots {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 420px;
      margin-top: 24px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1e293b;
      border: 1.5px solid #334155;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dot.seen { background: #0d9488; border-color: #14b8a6; }
    .dot.current { background: #a78bfa; border-color: #a78bfa; transform: scale(1.3); }

    .tip {
      color: #475569;
      font-size: 0.75rem;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>🧪 화학식 학습 카드</h1>
<p class="subtitle">중학교 필수 화학식 &middot; 카드를 클릭하면 이름이 나타납니다</p>

<div class="category-wrap" id="categoryWrap"></div>

<div class="mode-wrap">
  <button class="btn-mode active" id="modeSeq" onclick="setMode('seq')">순서대로</button>
  <button class="btn-mode" id="modeShuffle" onclick="setMode('shuffle')">랜덤</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressFill"></div>
</div>
<p class="progress-label" id="progressLabel">1 / 30</p>

<div class="card-scene" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face card-front">
      <div class="cat-badge" id="frontCat"></div>
      <div class="formula" id="frontFormula"></div>
      <div class="hint">탭하면 이름 확인</div>
    </div>
    <div class="card-face card-back">
      <div class="cat-badge" id="backCat"></div>
      <div class="formula-sm" id="backFormula"></div>
      <div class="name-ko" id="backNameKo"></div>
      <div class="name-en" id="backNameEn"></div>
      <div class="desc" id="backDesc"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn-nav" id="btnPrev" onclick="navigate(-1)">&#9664;</button>
  <button class="btn-flip" onclick="flipCard()">뒤집기</button>
  <button class="btn-nav" id="btnNext" onclick="navigate(1)">&#9654;</button>
</div>

<div class="dots" id="dots"></div>
<p class="tip">키보드 ← → 로 이동 &nbsp;|&nbsp; 스페이스바로 뒤집기</p>

<script>
  const all = [
    // 산화물
    { cat: '산화물', formula: 'H₂O',   ko: '물',          en: 'Water',            desc: '수소 2개 + 산소 1개' },
    { cat: '산화물', formula: 'CO₂',   ko: '이산화 탄소',  en: 'Carbon dioxide',   desc: '광합성·호흡의 핵심 물질' },
    { cat: '산화물', formula: 'CO',    ko: '일산화 탄소',  en: 'Carbon monoxide',  desc: '불완전 연소 시 발생하는 유독 기체' },
    { cat: '산화물', formula: 'SO₂',   ko: '이산화 황',   en: 'Sulfur dioxide',   desc: '산성비의 원인 물질' },
    { cat: '산화물', formula: 'NO₂',   ko: '이산화 질소', en: 'Nitrogen dioxide', desc: '대기 오염의 원인 물질' },
    { cat: '산화물', formula: 'Fe₂O₃', ko: '산화 철(III)', en: 'Iron(III) oxide',  desc: '철이 녹슨 것 (붉은 녹)' },
    { cat: '산화물', formula: 'CaO',   ko: '산화 칼슘',   en: 'Calcium oxide',    desc: '생석회, 물과 반응하면 소석회가 됨' },

    // 산
    { cat: '산',     formula: 'HCl',   ko: '염산',        en: 'Hydrochloric acid', desc: '강산, 위산의 주성분' },
    { cat: '산',     formula: 'H₂SO₄', ko: '황산',        en: 'Sulfuric acid',     desc: '강산, 자동차 배터리에 사용' },
    { cat: '산',     formula: 'HNO₃',  ko: '질산',        en: 'Nitric acid',       desc: '강산, 비료·폭약 제조에 사용' },
    { cat: '산',     formula: 'CH₃COOH', ko: '아세트산',  en: 'Acetic acid',       desc: '약산, 식초의 신맛 성분' },
    { cat: '산',     formula: 'H₂CO₃', ko: '탄산',        en: 'Carbonic acid',     desc: '약산, 탄산음료의 톡 쏘는 맛' },

    // 염기
    { cat: '염기',   formula: 'NaOH',  ko: '수산화 나트륨', en: 'Sodium hydroxide',   desc: '강염기, 비누·종이 제조에 사용' },
    { cat: '염기',   formula: 'Ca(OH)₂', ko: '수산화 칼슘', en: 'Calcium hydroxide', desc: '소석회, 시멘트 원료' },
    { cat: '염기',   formula: 'NH₃',   ko: '암모니아',    en: 'Ammonia',            desc: '약염기, 자극적인 냄새의 기체' },
    { cat: '염기',   formula: 'KOH',   ko: '수산화 칼륨', en: 'Potassium hydroxide', desc: '강염기, 비누·배터리에 사용' },

    // 염
    { cat: '염',     formula: 'NaCl',  ko: '염화 나트륨', en: 'Sodium chloride',   desc: '소금, 식용·방부제로 사용' },
    { cat: '염',     formula: 'CaCO₃', ko: '탄산 칼슘',   en: 'Calcium carbonate', desc: '석회석·대리석·조개껍데기의 성분' },
    { cat: '염',     formula: 'Na₂CO₃', ko: '탄산 나트륨', en: 'Sodium carbonate', desc: '소다, 세제·유리 제조에 사용' },
    { cat: '염',     formula: 'NaHCO₃', ko: '탄산수소 나트륨', en: 'Sodium bicarbonate', desc: '베이킹소다, 제빵·제과에 사용' },
    { cat: '염',     formula: 'CaSO₄', ko: '황산 칼슘',   en: 'Calcium sulfate',   desc: '석고, 건설재료·의료에 사용' },

    // 원소 기체
    { cat: '원소 기체', formula: 'H₂',  ko: '수소',       en: 'Hydrogen gas',      desc: '가장 가벼운 기체, 미래 연료' },
    { cat: '원소 기체', formula: 'O₂',  ko: '산소',       en: 'Oxygen gas',        desc: '호흡·연소에 필요한 기체' },
    { cat: '원소 기체', formula: 'N₂',  ko: '질소',       en: 'Nitrogen gas',      desc: '공기의 78%를 차지하는 기체' },
    { cat: '원소 기체', formula: 'Cl₂', ko: '염소',       en: 'Chlorine gas',      desc: '황록색 독성 기체, 소독제 원료' },

    // 유기물
    { cat: '유기물', formula: 'C₆H₁₂O₆', ko: '포도당',  en: 'Glucose',           desc: '생물 에너지의 기본 원료' },
    { cat: '유기물', formula: 'C₁₂H₂₂O₁₁', ko: '설탕(자당)', en: 'Sucrose',      desc: '포도당 + 과당으로 이루어진 이당류' },
    { cat: '유기물', formula: 'C₂H₅OH', ko: '에탄올',    en: 'Ethanol',           desc: '알코올 음료·소독제의 주성분' },
    { cat: '유기물', formula: 'CH₄',   ko: '메테인',     en: 'Methane',           desc: '천연가스의 주성분' },
    { cat: '유기물', formula: 'C₃H₈',  ko: '프로페인',   en: 'Propane',           desc: '가정용 LPG 가스의 주성분' },
  ];

  const categories = ['전체', ...new Set(all.map(e => e.cat))];
  let activeCategory = '전체';
  let filtered = [...all];
  let order = filtered.map((_, i) => i);
  let currentIdx = 0;
  let flipped = false;
  let seen = new Set([0]);
  let mode = 'seq';

  // Build category buttons
  const catWrap = document.getElementById('categoryWrap');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'btn-cat' + (cat === '전체' ? ' active' : '');
    btn.textContent = cat + (cat === '전체' ? ' (' + all.length + ')' : ' (' + all.filter(e => e.cat === cat).length + ')');
    btn.onclick = () => selectCategory(cat);
    catWrap.appendChild(btn);
  });

  function selectCategory(cat) {
    activeCategory = cat;
    filtered = cat === '전체' ? [...all] : all.filter(e => e.cat === cat);
    document.querySelectorAll('.btn-cat').forEach((btn, i) => {
      btn.classList.toggle('active', categories[i] === cat);
    });
    resetDeck();
  }

  function resetDeck() {
    if (mode === 'shuffle') {
      order = [...Array(filtered.length).keys()].sort(() => Math.random() - 0.5);
    } else {
      order = filtered.map((_, i) => i);
    }
    currentIdx = 0;
    flipped = false;
    seen = new Set([0]);
    render();
  }

  function setMode(m) {
    mode = m;
    document.getElementById('modeSeq').classList.toggle('active', m === 'seq');
    document.getElementById('modeShuffle').classList.toggle('active', m === 'shuffle');
    resetDeck();
  }

  function render() {
    const el = filtered[order[currentIdx]];
    document.getElementById('frontCat').textContent = el.cat;
    document.getElementById('frontFormula').textContent = el.formula;
    document.getElementById('backCat').textContent = el.cat;
    document.getElementById('backFormula').textContent = el.formula;
    document.getElementById('backNameKo').textContent = el.ko;
    document.getElementById('backNameEn').textContent = el.en;
    document.getElementById('backDesc').textContent = el.desc;

    document.getElementById('cardInner').classList.toggle('flipped', flipped);

    const pct = ((currentIdx + 1) / filtered.length * 100).toFixed(0);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = (currentIdx + 1) + ' / ' + filtered.length;

    document.getElementById('btnPrev').disabled = currentIdx === 0;
    document.getElementById('btnNext').disabled = currentIdx === filtered.length - 1;

    renderDots();
  }

  function renderDots() {
    const container = document.getElementById('dots');
    container.innerHTML = '';
    for (let i = 0; i < filtered.length; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (seen.has(i) ? ' seen' : '') + (i === currentIdx ? ' current' : '');
      (function(idx) { d.onclick = function(e) { e.stopPropagation(); goTo(idx); }; })(i);
      container.appendChild(d);
    }
  }

  function flipCard() {
    flipped = !flipped;
    document.getElementById('cardInner').classList.toggle('flipped', flipped);
  }

  function navigate(dir) {
    const next = currentIdx + dir;
    if (next < 0 || next >= filtered.length) return;
    currentIdx = next;
    flipped = false;
    seen.add(currentIdx);
    render();
  }

  function goTo(i) {
    currentIdx = i;
    flipped = false;
    seen.add(i);
    render();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') navigate(1);
    else if (e.key === 'ArrowLeft') navigate(-1);
    else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  });

  render();
</script>
</body>
</html>
